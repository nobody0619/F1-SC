<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>纪老师 F5 SC 精英训练网</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --line:#e5e7eb; --text:#111827; --muted:#6b7280;
      --primary:#0f766e; --danger:#b91c1c; --warn:#b45309; --ok:#15803d; --boss:#7c3aed;
    }
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);max-width:980px;margin:auto;padding:12px;text-align:center}
    #login,#chapters,#quiz,#finish{margin:14px 0}
    #chapters,#quiz,#finish{display:none}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.04)}
    .floating-back{position:sticky;top:10px;left:0;text-align:left;z-index:5;margin-bottom:10px}
    .floating-back button,.btn{padding:10px 14px;border-radius:999px;border:0;background:#111827;color:#fff;cursor:pointer}
    .btn.secondary{background:#fff;color:#111827;border:1px solid #111827}
    .btn.ghost{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .btn.boss{background:var(--boss)}
    .btn.small{padding:7px 11px;border-radius:10px;font-size:13px}
    input[type="text"], input[type="password"]{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;margin:8px 0;background:#fff}
    .login-wrap{max-width:430px;margin:30px auto}
    .top-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:10px 0}
    .pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:14px}
    .group{margin:16px 0;text-align:left}
    .group-title{font-size:20px;font-weight:700;margin:8px 0 10px}
    .boss-card,.monster-item{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;margin:10px 0}
    .boss-card{border-color:#ddd6fe;background:#faf5ff}
    .title{text-align:left;min-width:0}
    .title-main{font-weight:700}
    .meta{color:var(--muted);font-size:13px;margin-top:4px;line-height:1.5}
    .status{font-weight:700}
    .alive{color:var(--ok)} .dead{color:var(--danger)} .locked{color:var(--warn)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    #topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    #topbar .left{text-align:left}
    progress{width:100%;height:18px}
    .question{text-align:left;margin:15px 0;padding-left:6px}
    .option-label{display:block;margin:6px 0;cursor:pointer;padding:8px;border-radius:10px}
    .option-label:hover{background:#f3f4f6}
    .feedback{font-weight:bold;margin:12px 0;line-height:1.6}
    input[type="radio"],input[type="checkbox"]{transform:scale(1.2);margin-right:8px}
    img{max-width:100%;margin:10px 0;border:2px solid #ccc;border-radius:10px}
    #submit-status{margin-top:10px;font-size:14px}
    .muted{color:var(--muted)}
    .hide{display:none!important}
  </style>
</head>
<body>

<div id="login" class="login-wrap">
  <div class="card">
    <h2 id="loginTitle"></h2>
    <p class="muted">请输入姓名和月密码</p>
    <input type="text" id="username" placeholder="姓名 / Name"/>
    <input type="password" id="monthPassword" placeholder="月密码 / Monthly Password"/>
    <button id="startBtn" class="btn" type="button">进入 / Start</button>
    <p id="loginMsg" class="muted"></p>
  </div>
</div>

<div id="chapters">
  <div class="floating-back">
    <button type="button" id="logoutBtn">⎋ 退出</button>
  </div>
  <div class="card" style="margin-bottom:12px;">
    <h2 style="margin:0 0 10px;">怪物复习地图</h2>
    <div class="top-stats">
      <div class="pill" id="statUser">学生：-</div>
      <div class="pill" id="statBook">科目：-</div>
      <div class="pill" id="statLevel">Level 1</div>
      <div class="pill" id="statExp">EXP 0</div>
    </div>
  </div>
  <div id="chapterWrap"></div>
</div>

<div id="quiz">
  <div class="floating-back">
    <button type="button" id="backToListTop">🏠 回到章节选择</button>
  </div>
  <div class="card">
    <div id="topbar">
      <div class="left">
        <div id="quiz-title" style="font-weight:bold;"></div>
        <div id="mode-badge" class="muted"></div>
      </div>
      <div class="right">
        <span id="score">得分: 0</span>
        <span id="remaining" style="margin-left:10px;">剩余题目: 0</span>
      </div>
    </div>
    <progress id="progress" value="0" max="0"></progress>
    <div id="question-area"></div>
  </div>
</div>

<div id="finish">
  <div class="floating-back">
    <button type="button" id="backFromFinish">🏠 回到章节选择</button>
  </div>
  <div class="card">
    <h3 id="finish-msg"></h3>
    <p id="stats"></p>
    <p id="battle-result"></p>
    <p id="submit-status"></p>
    <div id="controls"></div>
  </div>
</div>

<iframe name="postFrame" style="display:none;"></iframe>
<form id="postForm"
      action="https://script.google.com/macros/s/AKfycbwOadAK74XfAiOFkokD6zlQ8kQZTFDI0_SVWwMSSRgT8mwuoCac2VSAIj8X07L7NVVF/exec"
      method="post" target="postFrame" style="display:none;">
  <input name="action" value="submitScore"/>
  <input name="book"/>
  <input name="quizId"/><input name="name"/><input name="score"/>
  <input name="correct"/><input name="wrong"/><input name="time"/><input name="mode"/><input name="expGained"/>
</form>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginTitle').textContent = document.title;

  const MAX_OPTS = 15;
  const SCRIPT_URL = document.getElementById('postForm').action;
  const STORAGE_KEY = 'kee_quiz_game_auth_v1';
  const TZ = 'Asia/Kuala_Lumpur';

  let user = '';
  let book = inferBookFromTitle(document.title) || 'DEFAULT';
  let rows = [];
  let chapterKey, labelKey, sheetKey;
  let currentRow = null;
  let currentMode = 'practice';
  let currentBab = null;
  let qs = [], queue = [], score = 0, correct = 0, wrong = 0, chapterStart = 0;
  let currentExpGain = 0;
  let currentBossMeta = null;
  let countCache = new Map();
  let monsterQuestionCache = new Map();
  let progressState = { exp:0, level:1, monsters:{}, bosses:{} };

  const saved = readSavedAuth();
  if (saved && saved.user && saved.password) {
    document.getElementById('username').value = saved.user;
    document.getElementById('monthPassword').value = saved.password;
  }

  document.getElementById('startBtn').onclick = handleLogin;
  document.getElementById('backToListTop').onclick = showChapterList;
  document.getElementById('backFromFinish').onclick = () => {
    document.getElementById('finish').style.display = 'none';
    showChapterList();
  };
  document.getElementById('logoutBtn').onclick = () => {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  };

  async function handleLogin(){
    const nm = document.getElementById('username').value.trim();
    const pwd = document.getElementById('monthPassword').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!nm || !pwd) return msg.textContent = '请输入姓名和月密码';
    msg.textContent = '正在验证...';
    try {
      const r = await jsonp({ action:'checkPassword', book, name:nm, password:pwd });
      if (!r.ok) { msg.textContent = r.error || '验证失败'; return; }
      user = nm;
      saveAuth(user, pwd);
      await loadChapters();
      await loadProgress();
      updateHeader();
      document.getElementById('login').style.display = 'none';
      showChapterList();
      msg.textContent = '';
    } catch (e) {
      console.error(e);
      msg.textContent = '验证失败，请检查 Apps Script 链接或密码';
    }
  }

  function inferBookFromTitle(title){
    const m = String(title||'').match(/(F\d+\s+(?:SC|ACC)|MM|F4-ACC-Free)/i);
    return m ? m[1].toUpperCase() : '';
  }

  function saveAuth(user, password){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ user, password }));
  }
  function readSavedAuth(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
  }

  function updateHeader(){
    document.getElementById('statUser').textContent = '学生：' + user;
    document.getElementById('statBook').textContent = '科目：' + book;
    document.getElementById('statExp').textContent = 'EXP ' + (progressState.exp || 0);
    document.getElementById('statLevel').textContent = 'Level ' + (progressState.level || 1);
  }

  function jsonp(params){
    return new Promise((resolve, reject) => {
      const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const s = document.createElement('script');
      const q = new URLSearchParams({ ...params, callback: cb, _: String(Date.now()) });
      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };
      s.onerror = () => { cleanup(); reject(new Error('JSONP error')); };
      function cleanup(){
        delete window[cb];
        s.remove();
      }
      s.src = SCRIPT_URL + '?' + q.toString();
      document.body.appendChild(s);
    });
  }

  function loadChapters(){
    return new Promise((resolve, reject) => {
      Papa.parse('Chapters.csv', {
        download:true, header:true, skipEmptyLines:true,
        complete(res){
          rows = res.data.map(raw => {
            const r={}; Object.entries(raw).forEach(([k,v])=>r[k.trim()]=v?.toString()?.trim() ?? v);
            return r;
          });
          if (!rows.length) return reject(new Error('请检查 Chapters.csv'));
          const keys = Object.keys(rows[0]);
          chapterKey = keys.find(k=>k.toLowerCase()==='chapter');
          labelKey   = keys.find(k=>k.toLowerCase()==='label');
          sheetKey   = keys.find(k=>k.toLowerCase()==='sheet');
          if (!chapterKey || !labelKey || !sheetKey) return reject(new Error('Chapters.csv 需要列: chapter, label, sheet'));
          resolve();
        },
        error(err){ reject(err); }
      });
    });
  }

  async function loadProgress(){
    const r = await jsonp({ action:'getProgress', book, name:user });
    if (r.ok) {
      progressState = r.progress || { exp:0, level:1, monsters:{}, bosses:{} };
    }
  }

  function getMainChapterNo(chapterStr){
    if (!chapterStr) return null;
    const m = String(chapterStr).match(/(?:^|\s)(?:Chp|Bab)\s*([0-9]+)/i);
    return m ? parseInt(m[1],10) : null;
  }

  async function showChapterList(){
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('finish').style.display = 'none';
    const wrap = document.getElementById('chapterWrap');
    wrap.innerHTML = '';
    updateHeader();

    const groups = new Map();
    const order = [];
    const OTHERS = 'OTHERS';
    for (const r of rows){
      const no = getMainChapterNo(r[chapterKey]);
      const key = no === null ? OTHERS : String(no);
      if (!groups.has(key)) { groups.set(key, []); if (key !== OTHERS) order.push(key); }
      groups.get(key).push(r);
    }

    for (const key of [...order, ...(groups.has(OTHERS)?[OTHERS]:[])]) {
      const arr = groups.get(key);
      const g = document.createElement('div'); g.className = 'group';
      const title = document.createElement('div'); title.className = 'group-title';
      title.textContent = key === 'OTHERS' ? '其他 Others' : `Chp/Bab ${key}`;
      g.appendChild(title);

      if (key !== 'OTHERS') {
        const bossCard = await buildBossCard(key, arr);
        g.appendChild(bossCard);
      }

      for (const row of arr) {
        const item = await buildMonsterItem(row);
        g.appendChild(item);
      }
      wrap.appendChild(g);
    }
    document.getElementById('chapters').style.display = 'block';
  }

  function buildMonsterId(row){
    return [book, row[chapterKey]||'', row[labelKey]||'', row[sheetKey]||''].join('||');
  }

  async function getQuestionCount(url){
    if (countCache.has(url)) return countCache.get(url);
    const cnt = await new Promise(resolve => {
      Papa.parse(url, {
        download:true, header:true, skipEmptyLines:true,
        complete(r2){
          const c = r2.data.filter(q => q.question && String(q.question).trim()).length;
          resolve(c);
        },
        error(){ resolve(0); }
      });
    });
    countCache.set(url, cnt);
    return cnt;
  }

  async function buildMonsterItem(row){
    const item = document.createElement('div'); item.className = 'monster-item';
    const left = document.createElement('div'); left.className = 'title';
    const monsterId = buildMonsterId(row);
    const st = progressState.monsters[monsterId] || {};
    const titleText = `${row[chapterKey]}${row[labelKey] ? ' — ' + row[labelKey] : ''}`;
    const cnt = await getQuestionCount(row[sheetKey]);
    const now = Date.now();
    const isDead = st.reviveAt && Number(st.reviveAt) > now;
    const statusText = isDead ? `Dead（${daysLeft(st.reviveAt)}后复活）` : 'Alive';
    const streak = Number(st.killStreak || 0);
    left.innerHTML = `
      <div class="title-main">🧟 ${escapeHtml(titleText)}</div>
      <div class="meta">题数：${cnt}<br>状态：<span class="status ${isDead?'dead':'alive'}">${statusText}</span><br>连杀：${streak}</div>
    `;

    const actions = document.createElement('div'); actions.className = 'actions';
    const practiceBtn = document.createElement('button');
    practiceBtn.className = 'btn secondary small';
    practiceBtn.textContent = '做练习';
    practiceBtn.onclick = () => startQuiz(row, 'practice');

    const fightBtn = document.createElement('button');
    fightBtn.className = 'btn small';
    fightBtn.textContent = '⚔️ 打怪';
    fightBtn.disabled = isDead;
    fightBtn.onclick = () => startQuiz(row, 'monster');

    actions.append(practiceBtn, fightBtn);
    item.append(left, actions);
    return item;
  }

  async function buildBossCard(babNo, arr){
    const card = document.createElement('div'); card.className = 'boss-card';
    const left = document.createElement('div'); left.className = 'title';
    const bossState = progressState.bosses[String(babNo)] || { hp:100, killCount:0, reviveAt:0 };
    const total = arr.length;
    let deadCount = 0;
    const now = Date.now();
    for (const row of arr) {
      const st = progressState.monsters[buildMonsterId(row)] || {};
      if (st.reviveAt && Number(st.reviveAt) > now) deadCount++;
    }
    const deadPct = total ? deadCount / total : 0;
    const locked = deadPct < 0.7;
    const isDead = bossState.reviveAt && Number(bossState.reviveAt) > now;
    const bossStatus = isDead ? `Dead（${daysLeft(bossState.reviveAt)}后复活）` : (locked ? `Locked（已击败 ${deadCount}/${total} 小怪）` : `HP ${Number(bossState.hp || 100)}/100`);
    left.innerHTML = `
      <div class="title-main">👹 Bab ${babNo} Boss</div>
      <div class="meta">状态：<span class="status ${isDead?'dead':(locked?'locked':'alive')}">${bossStatus}</span><br>Boss击杀次数：${Number(bossState.killCount||0)}</div>
    `;
    const actions = document.createElement('div'); actions.className = 'actions';
    const btn = document.createElement('button'); btn.className = 'btn boss small'; btn.textContent = '⚔️ 挑战 Boss';
    btn.disabled = locked || isDead;
    btn.onclick = () => startBossFight(babNo, arr);
    actions.appendChild(btn);
    card.append(left, actions);
    return card;
  }

  async function startQuiz(row, mode){
    currentMode = mode;
    currentRow = row;
    currentBab = getMainChapterNo(row[chapterKey]);
    currentBossMeta = null;
    document.getElementById('chapters').style.display = 'none';
    document.getElementById('quiz-title').textContent = `${row[chapterKey]}${row[labelKey] ? ' — ' + row[labelKey] : ''}`;
    document.getElementById('mode-badge').textContent = mode === 'practice' ? '模式：普通练习' : '模式：小怪挑战';
    score = correct = wrong = 0;
    currentExpGain = 0;
    chapterStart = Date.now();
    Papa.parse(row[sheetKey], {
      download:true, header:true, skipEmptyLines:true,
      complete(res){
        qs = res.data.map(q => ({...q, attempt:0})).filter(q => q.question && String(q.question).trim());
        queue = shuffle([...qs]);
        document.getElementById('quiz').style.display = 'block';
        updateUI(0);
        nextQ();
      },
      error(){ alert('这个章节的题目加载失败了，请检查表格链接。'); showChapterList(); }
    });
  }

  async function startBossFight(babNo, arr){
    currentMode = 'boss';
    currentRow = { [chapterKey]: `Bab ${babNo}`, [labelKey]:'Boss Challenge' };
    currentBab = babNo;
    currentExpGain = 0;
    chapterStart = Date.now();
    score = correct = wrong = 0;
    document.getElementById('chapters').style.display = 'none';
    document.getElementById('quiz-title').textContent = `Bab ${babNo} Boss`;
    document.getElementById('mode-badge').textContent = '模式：Boss 挑战';

    let all = [];
    for (const row of arr) {
      const list = await loadQuestions(row[sheetKey]);
      all = all.concat(list);
    }
    all = all.filter(q => q.question && String(q.question).trim());
    const count = Math.min(20, Math.max(8, Math.ceil(all.length * 0.25)));
    qs = shuffle(all).slice(0, count).map(q => ({...q, attempt:0}));
    queue = [...qs];
    currentBossMeta = { totalPool: all.length, count };
    document.getElementById('quiz').style.display = 'block';
    updateUI(0);
    nextQ();
  }

  function loadQuestions(url){
    if (monsterQuestionCache.has(url)) return Promise.resolve(monsterQuestionCache.get(url));
    return new Promise(resolve => {
      Papa.parse(url, {
        download:true, header:true, skipEmptyLines:true,
        complete(res){
          const list = res.data;
          monsterQuestionCache.set(url, list);
          resolve(list);
        },
        error(){ resolve([]); }
      });
    });
  }

  function updateUI(delta){
    document.getElementById('score').textContent = `得分: ${score} ${delta ? '(' + (delta>0?'+':'') + delta + ')' : ''}`;
    document.getElementById('remaining').textContent = `剩余题目: ${queue.length}`;
    const pg = document.getElementById('progress');
    pg.max = qs.length || 1; pg.value = (qs.length - queue.length);
  }

  function nextQ(){
    const qa = document.getElementById('question-area');
    qa.innerHTML = ''; updateUI(0);
    if (queue.length === 0) return finishQuiz();

    const q = queue.shift();
    const div = document.createElement('div'); div.className = 'question';
    div.innerHTML = `<p><strong>${(q.question||'').replace(/\r?\n/g,'<br/>')}</strong></p>`;

    if (q.image){
      const img = document.createElement('img');
      img.src = String(q.image).replace(/\s*\//g,'/').trim();
      div.appendChild(img);
    }

    const opts = document.createElement('div'); opts.className = 'options';
    if (q.type === 'text'){
      opts.innerHTML = '<input type="text" id="txtAns" placeholder="请输入答案…"/>';
    } else {
      const letters = Array.from({length:MAX_OPTS}, (_,i)=>String.fromCharCode(65+i));
      shuffle(letters.filter(l=>q[l])).forEach(l=>{
        const inp = document.createElement('input');
        inp.type = (q.type==='checkbox'?'checkbox':'radio');
        inp.name='opt'; inp.value=l; inp.id='opt_'+l;
        const lbl=document.createElement('label'); lbl.className='option-label'; lbl.htmlFor='opt_'+l;
        lbl.appendChild(inp); lbl.append(' '+q[l]); opts.appendChild(lbl);
      });
    }
    div.appendChild(opts);

    const fb = document.createElement('div'); fb.className='feedback'; div.appendChild(fb);
    const sb = document.createElement('button'); sb.className='btn'; sb.textContent='提交';
    sb.onclick = () => {
      let ua=[];
      if (q.type==='text'){
        ua = document.getElementById('txtAns').value.split(',').map(s=>s.trim()).filter(Boolean);
      } else {
        ua = Array.from(div.querySelectorAll('input[name="opt"]:checked')).map(i=>i.value);
      }
      if (!ua.length) return alert('请选择或输入答案');

      let isC=false;
      if (q.type==='text'){
        const lows = ua.map(s=>s.toLowerCase());
        const ansList = String(q.answer||'').split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
        isC = lows.some(v=>ansList.includes(v));
      } else if (q.type === 'checkbox') {
        const uaA = ua.map(s=>s.toUpperCase()).sort().join(',');
        const caA = String(q.answer||'').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean).sort().join(',');
        isC = uaA === caA;
      } else {
        const accept = String(q.answer||'').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
        isC = ua.length === 1 && accept.includes(ua[0].toUpperCase());
      }

      const allAnsHtml = (() => {
        if (q.type === 'text') {
          return String(q.answer||'').split(',').map(s=>s.trim()).filter(Boolean).map((s,i)=>`${i+1}. ${s}`).join('<br>');
        }
        return String(q.answer||'').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean).map(letter => q[letter] || letter).join('<br>');
      })();

      let delta;
      if (currentMode === 'practice') {
        delta = isC ? (q.attempt?1:2) : (q.attempt?-2:-1);
      } else {
        delta = isC ? 2 : -1;
      }
      score += delta; if (isC) correct++; else wrong++;

      const explainLine = q.explain ? `<br><span style="font-weight:normal">${String(q.explain)}</span>` : '';
      fb.innerHTML = isC
        ? `正确! ${delta>0?'+':''}${delta}<br>正确答案：<br>${allAnsHtml}${explainLine}`
        : `错误! ${delta}<br>正确答案：<br>${allAnsHtml}${explainLine}`;

      updateUI(delta);
      sb.disabled = true;
      const nb = document.createElement('button'); nb.className='btn secondary'; nb.textContent = '下一题'; nb.onclick = nextQ;
      div.appendChild(nb);

      if (!isC && currentMode === 'practice'){
        q.attempt++;
        for (let i=0;i<2;i++) queue.splice(Math.floor(Math.random()*(queue.length+1)),0,{...q});
      }
    };
    div.appendChild(sb);

    document.getElementById('question-area').appendChild(div);
  }

  async function finishQuiz(){
    document.getElementById('quiz').style.display='none';
    document.getElementById('finish').style.display='block';

    const accuracy = qs.length ? (correct / qs.length) : 0;
    const accuracyPct = Math.round(accuracy * 100);
    let battleMsg = '';
    let exp = 10;

    if (currentMode === 'monster') {
      const kill = accuracy >= 0.70;
      const perfect = accuracy >= 0.90;
      if (kill) exp += 20;
      if (perfect) exp += 30;
      const res = await jsonp({ action:'updateMonster', book, name:user, monsterId:buildMonsterId(currentRow), accuracy: accuracyPct });
      if (res.ok) {
        progressState = res.progress;
        battleMsg = kill
          ? (perfect ? `💀 Perfect Kill！小怪已死亡，30天后复活。` : `💀 小怪已击败，进入复活倒数。`)
          : `⚠️ 未达到击杀门槛（需要 ≥70%），小怪仍存活。`;
      }
    } else if (currentMode === 'boss') {
      if (accuracy >= 0.90) exp += 150;
      else if (accuracy >= 0.70) exp += 60;
      else if (accuracy >= 0.50) exp += 25;
      const res = await jsonp({ action:'updateBoss', book, name:user, bab:String(currentBab), accuracy: accuracyPct });
      if (res.ok) {
        progressState = res.progress;
        const b = res.boss || {};
        if (b.killedNow) battleMsg = '👹 Boss 已被击杀！本 Bab 所有小怪也同步死亡一次。';
        else battleMsg = `⚔️ Boss 仍存活，当前 HP：${Number(b.hp||0)}/100。需要继续挑战。`;
      }
    } else {
      battleMsg = accuracy >= 70 ? '📘 练习完成，已记录成绩。' : '📘 练习完成。';
    }

    currentExpGain = exp;
    const expRes = await jsonp({ action:'addExp', book, name:user, amount:String(exp), reason:currentMode });
    if (expRes.ok) progressState = expRes.progress;
    updateHeader();

    document.getElementById('finish-msg').textContent = `恭喜 ${user}，本次完成！`;
    document.getElementById('stats').textContent = `模式：${modeLabel(currentMode)}｜得分: ${score}｜正确率: ${accuracyPct}%｜答对 ${correct} 题｜答错 ${wrong} 题｜EXP +${exp}`;
    document.getElementById('battle-result').textContent = battleMsg;
    document.getElementById('submit-status').textContent = '正在上传成绩…';

    submitScore();

    const ctrl=document.getElementById('controls'); ctrl.innerHTML='';
    const back=document.createElement('button'); back.className='btn';
    back.textContent='返回章节选择';
    back.onclick=()=>{ document.getElementById('finish').style.display='none'; showChapterList(); };
    ctrl.appendChild(back);
  }

  function modeLabel(m){
    return m === 'practice' ? '普通练习' : (m === 'monster' ? '小怪挑战' : 'Boss挑战');
  }

  function submitScore(){
    const form = document.getElementById('postForm');
    const payload = {
      book,
      quizId: currentMode === 'boss' ? `Bab ${currentBab} Boss` : currentRow[chapterKey],
      name: user,
      score,
      correct,
      wrong,
      time: Math.floor((Date.now()-chapterStart)/1000),
      mode: currentMode,
      expGained: currentExpGain
    };
    form.book.value    = payload.book;
    form.quizId.value  = payload.quizId;
    form.name.value    = payload.name;
    form.score.value   = payload.score;
    form.correct.value = payload.correct;
    form.wrong.value   = payload.wrong;
    form.time.value    = payload.time;
    form.mode.value    = payload.mode;
    form.expGained.value = payload.expGained;
    form.submit();
    document.getElementById('submit-status').textContent = '✅ 成绩已提交（若 Apps Script 权限正确）';
  }

  function daysLeft(ts){
    const diff = Number(ts) - Date.now();
    const days = Math.ceil(diff / (1000*60*60*24));
    return `${Math.max(days,1)}天`;
  }

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
});
</script>
